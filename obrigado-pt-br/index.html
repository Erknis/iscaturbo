<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Obrigado - Isca Turbo</title>
  <meta name="description" content="Obrigado.">
  <style>
    :root {
      --bg: #020907;
      --panel: #071611;
      --text: #f5f0df;
      --muted: #b9c6b7;
      --green: #a6d916;
      --line: rgba(166, 217, 22, .28);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 0, rgba(166, 217, 22, .18), transparent 18rem),
        radial-gradient(circle at 50% 100%, rgba(25, 151, 154, .18), transparent 18rem),
        var(--bg);
    }

    main {
      width: min(390px, 100%);
      padding: 36px 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(7, 22, 17, .96), rgba(2, 9, 7, .98));
      text-align: center;
      box-shadow: 0 24px 48px rgba(0, 0, 0, .42);
    }

    .seal {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--green);
      color: #07100d;
      font-size: 46px;
      font-weight: 950;
      line-height: 1;
      box-shadow: 0 0 30px rgba(166, 217, 22, .28);
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(54px, 18vw, 76px);
      line-height: .9;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 span {
      display: block;
      color: var(--green);
    }

  </style>
</head>
<body>
  <main>
    <div class="seal" aria-hidden="true">✓</div>
    <h1>Obrigado<span>pela compra.</span></h1>
  </main>
</body>
</html>
