<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Isca Turbo por Espécie</title>
  <meta name="description" content="Pare de testar isca às cegas. Pesque com estratégia com o método Isca Turbo por Espécie.">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      background: #020907;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0, rgba(104, 148, 18, .18), transparent 26rem),
        #020907;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(167, 214, 24, .22);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page-link {
      display: block;
      width: 100%;
      min-height: 100vh;
      color: inherit;
      text-decoration: none;
    }

    .frame {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: #06100d;
      box-shadow: 0 0 48px rgba(0, 0, 0, .72);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
    }

    .sticky {
      position: fixed;
      left: 50%;
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 5;
      width: min(392px, calc(100vw - 22px));
      min-height: 58px;
      display: grid;
      place-items: center;
      transform: translateX(-50%);
      border-radius: 8px;
      background: linear-gradient(180deg, #b9e232, #87b90f);
      color: #07100d;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 24px;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 14px 28px rgba(0, 0, 0, .48), inset 0 2px 0 rgba(255, 255, 255, .36);
      pointer-events: none;
    }

    .sticky small {
      display: block;
      margin-top: 3px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <a class="page-link" href="https://lastlink.com/p/C8DC7B8BA/checkout-payment/" aria-label="Ir para o checkout do Isca Turbo">
    <main class="frame">
      <img
        src="assets/isca-turbo-pt-br.png"
        alt="Isca Turbo por Espécie - Pare de testar às cegas, pesque com estratégia."
        onerror="this.onerror=null; this.src='/pt-br/assets/isca-turbo-pt-br.png';"
      >
    </main>
  </a>
  <div class="sticky" aria-hidden="true">
    Quero começar agora
    <small>Acesso imediato e seguro</small>
  </div>
  <script>
    const checkoutUrl = "https://lastlink.com/p/C8DC7B8BA/checkout-payment/";

    document.addEventListener("click", (event) => {
      const target = event.target;
      const isModifiedClick = event.metaKey || event.ctrlKey || event.shiftKey || event.altKey;

      if (!isModifiedClick && target instanceof Element) {
        event.preventDefault();
        window.location.href = checkoutUrl;
      }
    });
  </script>
</body>
</html>
